spring:
  application:
    name: course-application

# ── Wybór aktywnego podejścia ──────────────────────────────────
# Zmień na: anthropic-sdk | spring-ai | http-client
app:
  llm:
    provider: spring-ai
  # ── PODEJŚCIE 2: Spring AI ──────────────────────────────────
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}        # zmienna środowiskowa
      chat:
        options:
          model: claude-sonnet-4-6
          max-tokens: 1024
          temperature: 0.7


# ── PODEJŚCIE 1 & 3: wspólne ustawienia ───────────────────────
anthropic:
  api-key: ${ANTHROPIC_API_KEY}
  model: claude-sonnet-4-6
  max-tokens: 1024
  base-url: https://api.anthropic.com
  version: "2023-06-01"
